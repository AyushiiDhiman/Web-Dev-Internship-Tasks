<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google</title>


<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Roboto, Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    color: #202124;
}

.navbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 16px 24px;
    gap: 20px;
    font-size: 13px;
}

.navbar a {
    text-decoration: none;
    color: #202124;
}

.navbar a:hover {
    text-decoration: underline;
}

.profile {
    width: 32px;
    height: 32px;
    background-color: #1a73e8;
    color: white;
    border-radius: 50%;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-top: -80px;
}


.logo {
    font-size: 92px;
    font-weight: 500;
    letter-spacing: -4px;
    line-height: 1;
}

.logo span:nth-child(1) { color: #4285F4; }
.logo span:nth-child(2) { color: #DB4437; }
.logo span:nth-child(3) { color: #F4B400; }
.logo span:nth-child(4) { color: #4285F4; }
.logo span:nth-child(5) { color: #0F9D58; }
.logo span:nth-child(6) { color: #DB4437; }


.search-box {
    width: 584px;
    height: 44px;
    margin-top: 28px;
    border: 1px solid #dfe1e5;
    border-radius: 24px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
    background-color: #fff;
}

.search-box:hover {
    box-shadow: 0 1px 6px rgba(32,33,36,0.28);
    border-color: transparent;
}

.search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
}

.icon {
    font-size: 18px;
    opacity: 0.55;
}

.buttons {
    margin-top: 30px;
    display: flex;
    gap: 12px;
}

.buttons button {
    background-color: #f8f9fa;
    border: 1px solid #f8f9fa;
    padding: 10px 16px;
    font-size: 14px;
    border-radius: 4px;
    cursor: pointer;
    color: #3c4043;
}

.buttons button:hover {
    border: 1px solid #dadce0;
    box-shadow: 0 1px 1px rgba(0,0,0,0.1);
}


footer {
    background-color: #f2f2f2;
    font-size: 14px;
    color: #70757a;
}

.footer-top {
    padding: 15px 30px;
    border-bottom: 1px solid #dadce0;
}

.footer-bottom {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    flex-wrap: wrap;
}

.footer-bottom a {
    margin-right: 20px;
    text-decoration: none;
    color: #70757a;
}

.footer-bottom a:hover {
    text-decoration: underline;
}

@media (max-width: 768px) {
    .main {
        margin-top: -40px;
    }

    .logo {
        font-size: 72px;
    }

    .search-box {
        width: 90%;
    }

    .buttons {
        flex-wrap: wrap;
        justify-content: center;
    }

    .navbar a {
        display: none;
    }
}

@media (max-width: 480px) {
    .logo {
        font-size: 60px;
    }

    .buttons {
        flex-direction: column;
        gap: 10px;
    }

    .buttons button {
        width: 100%;
    }
}
</style>
</head>

<body>


<div class="navbar">
    <a href="#">Gmail</a>
    <a href="#">Images</a>
    <div class="profile">A</div>
</div>


<div class="main">
    <div class="logo">
        <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>

    <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text">
        <span class="icon">🎤</span>
    </div>

    <div class="buttons">
        <button>Google Search</button>
        <button>I’m Feeling Lucky</button>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <div class="footer-top">India</div>
    <div class="footer-bottom">
        <div>
            <a href="#">About</a>
            <a href="#">Advertising</a>
            <a href="#">Business</a>
        </div>
        <div>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Settings</a>
        </div>
    </div>
</footer>

</body>
</html>
