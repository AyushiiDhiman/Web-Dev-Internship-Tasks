<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beautiful Flexbox Image Gallery</title>

<style>
:root {
  --bg: #f6f7fb;
  --card: #ffffff;
  --accent: #6366f1;
  --shadow: 0 20px 40px rgba(0,0,0,0.12);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 30px;
  font-family: "Poppins", system-ui, sans-serif;
  background: var(--bg);
  color: #222;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
  font-size: 2.2rem;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 22px;
  justify-content: center;
}

.gallery img {
  width: calc(33.33% - 30px);
  height: 260px;
  border-radius: 18px;
  object-fit: cover;
  cursor: pointer;
  background: var(--card);
  box-shadow: var(--shadow);
  transition: 
    transform 0.4s ease,
    box-shadow 0.4s ease,
    filter 0.4s ease;
}

.gallery img:hover {
  transform: translateY(-8px) scale(1.04);
  box-shadow: 0 30px 60px rgba(0,0,0,0.18);
  filter: brightness(1.05);
}

@media (max-width: 900px) {
  .gallery img {
    width: calc(50% - 22px);
  }
}

@media (max-width: 600px) {
  .gallery img {
    width: 100%;
    height: 240px;
  }
}

.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
  justify-content: center;
  align-items: center;
  z-index: 1000;
  animation: fadeIn 0.4s ease;
}

.lightbox img {
  max-width: 92%;
  max-height: 90%;
  border-radius: 20px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.4);
  animation: zoomIn 0.4s ease;
}

.lightbox span {
  position: absolute;
  top: 22px;
  right: 30px;
  font-size: 44px;
  font-weight: 300;
  color: #fff;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.lightbox span:hover {
  transform: scale(1.2);
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes zoomIn {
  from { transform: scale(0.7); }
  to { transform: scale(1); }
}
</style>
</head>

<body>

<h1>Flexbox Image Gallery</h1>

<div class="gallery">
  <img src="https://picsum.photos/600/400?random=1" onclick="openLightbox(this)">
  <img src="https://picsum.photos/600/400?random=2" onclick="openLightbox(this)">
  <img src="https://picsum.photos/600/400?random=3" onclick="openLightbox(this)">
  <img src="https://picsum.photos/600/400?random=4" onclick="openLightbox(this)">
  <img src="https://picsum.photos/600/400?random=5" onclick="openLightbox(this)">
  <img src="https://picsum.photos/600/400?random=6" onclick="openLightbox(this)">
</div>

<div class="lightbox" id="lightbox">
  <span onclick="closeLightbox()">&times;</span>
  <img id="lightbox-img">
</div>

<script>
function openLightbox(img) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = img.src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
